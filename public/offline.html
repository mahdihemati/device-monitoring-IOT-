<!doctype html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#0f172a">
        <title>آفلاین هستید | داشبورد پایش یخچال‌های خون</title>
        <style>
            :root {
                color-scheme: light;
                font-family: Vazirmatn, IRANSans, Tahoma, Arial, sans-serif;
                background: #eef2f6;
                color: #0f172a;
            }

            body {
                direction: rtl;
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    linear-gradient(180deg, rgba(238, 242, 246, 0.96), rgba(248, 250, 252, 0.98)),
                    repeating-linear-gradient(90deg, rgba(15, 23, 42, 0.03) 0, rgba(15, 23, 42, 0.03) 1px, transparent 1px, transparent 56px);
            }

            main {
                width: min(100%, 480px);
                border: 1px solid #cbd5e1;
                border-radius: 12px;
                background: #ffffff;
                box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
                padding: 28px;
            }

            .icon {
                width: 52px;
                height: 52px;
                border-radius: 14px;
                display: grid;
                place-items: center;
                background: #0f172a;
                color: #ffffff;
                margin-bottom: 18px;
            }

            h1 {
                margin: 0;
                font-size: 24px;
                line-height: 1.2;
            }

            p {
                margin: 12px 0 0;
                color: #475569;
                font-size: 15px;
                line-height: 1.6;
            }

            button {
                margin-top: 22px;
                min-height: 44px;
                border: 0;
                border-radius: 10px;
                background: #0f172a;
                color: #ffffff;
                font: inherit;
                font-weight: 700;
                padding: 0 18px;
                cursor: pointer;
            }

            button:focus {
                outline: 4px solid #bfdbfe;
                outline-offset: 2px;
            }
        </style>
    </head>
    <body>
        <main>
            <div class="icon" aria-hidden="true">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                    <path d="M12 3v18M8 7h8M7 12h10M8 17h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>آفلاین هستید</h1>
            <p>پایش زنده یخچال‌های خون به اتصال اینترنت نیاز دارد. برای مشاهده تله‌متری جاری، هشدارها، تاریخچه و داده‌های مدیریت دوباره متصل شوید.</p>
            <p>داده‌های عملیاتی ذخیره‌شده اینجا نمایش داده نمی‌شوند، چون اطلاعات قدیمی نگهداری پزشکی می‌تواند گمراه‌کننده باشد.</p>
            <button type="button" onclick="window.location.reload()">تلاش دوباره</button>
        </main>
    </body>
</html>
